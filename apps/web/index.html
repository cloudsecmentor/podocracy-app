<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Podocracy Worker Portal</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Podocracy Worker Portal</h1>
          <p id="provider-status">Checking providers...</p>
        </div>
        <button id="refresh">Refresh</button>
      </header>

      <section class="panel">
        <h2>New Project</h2>
        <form id="project-form">
          <input type="hidden" name="translation_provider" value="openai">
          <label>
            Source media
            <input type="file" name="source" accept=".mp3,.mp4,.m4a,.wav,.url,audio/*,video/*">
          </label>

          <label>
            Source URL
            <input type="url" name="source_url" placeholder="https://...">
          </label>

          <div class="inline-row">
            <label>
              BEMA episode
              <input type="number" name="bema_episode" min="1" placeholder="34">
            </label>
            <button type="button" id="import-bema" class="secondary">Import BEMA</button>
          </div>
          <p class="muted">Downloads the episode MP3 and transcript into a new project.</p>

          <div class="grid">
            <label>
              Target language
              <select name="language">
                <option value="EN" selected>English (EN)</option>
                <option value="RU">Russian (RU)</option>
                <option value="UK">Ukrainian (UK)</option>
                <option value="JA">Japanese (JA)</option>
                <option value="ZH">Chinese (ZH)</option>
                <option value="ES">Spanish (ES)</option>
                <option value="FR">French (FR)</option>
                <option value="DE">German (DE)</option>
                <option value="IT">Italian (IT)</option>
              </select>
            </label>

            <label>
              Voice
              <select name="voice">
                <option value="alloy" selected>alloy</option>
                <option value="verse">verse</option>
                <option value="coral">coral</option>
                <option value="sage">sage</option>
              </select>
            </label>

            <label>
              Voiceover tempo
              <input type="number" name="voiceover_tempo" min="0.5" max="2" step="0.05" value="1.2">
              <span class="muted">1.0 = normal; legacy default is 1.2</span>
            </label>

            <label>
              Voiceover shift
              <input type="number" name="voiceover_shift" min="-300" max="300" step="0.1" value="1.5">
              <span class="muted">Seconds; positive moves narration later</span>
            </label>

            <label>
              Sentence size
              <input type="number" name="max_char_chunk_per_sentence" min="20" max="5000" step="10" value="200">
              <span class="muted">Max chars before sentence break</span>
            </label>

            <label>
              Transcript chunk
              <input type="number" name="max_char_chunk" min="50" max="20000" step="50" value="400">
              <span class="muted">Max chars per translated chunk</span>
            </label>
          </div>

          <div class="stage-picker">
            <div class="stage-picker-header">
              <strong>Stages</strong>
              <div class="stage-picker-actions">
                <button type="button" class="secondary" id="stages-select-all">Select all</button>
                <button type="button" class="secondary" id="stages-deselect-all">Deselect all</button>
              </div>
            </div>
            <div class="stage-picker-grid" id="stage-picker">
              <label><input type="checkbox" name="stage" value="transcribe" checked> Transcribe</label>
              <label><input type="checkbox" name="stage" value="translate" checked> Translate</label>
              <label><input type="checkbox" name="stage" value="customize" checked> Customize</label>
              <label><input type="checkbox" name="stage" value="improve" checked> Improve</label>
              <label><input type="checkbox" name="stage" value="voiceover" checked> Voiceover</label>
            </div>
            <p class="muted">Select all or deselect all, then fine-tune the pipeline.</p>
          </div>

          <div class="grid">
            <label>
              Subtitles
              <input type="file" name="subtitle_file" accept=".srt,.vtt,.sbv,.txt">
            </label>

            <label>
              Custom recordings ZIP
              <input type="file" name="custom_recordings" accept=".zip">
            </label>
          </div>

          <label>
            Custom instructions
            <textarea name="custom_instructions" rows="3" placeholder="Optional style, terminology, or pronunciation notes"></textarea>
          </label>

          <label class="check">
            <input type="checkbox" name="autogenerate_custom_instructions">
            Autogenerate improved instructions and append them to the custom instructions
          </label>

          <button type="submit">Create Project</button>
        </form>
      </section>

      <section class="split">
        <div class="panel">
          <h2>Projects</h2>
          <div id="projects" class="projects"></div>
        </div>

        <div class="panel">
          <h2>Project Detail</h2>
          <div id="detail" class="detail empty">Select a project.</div>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
