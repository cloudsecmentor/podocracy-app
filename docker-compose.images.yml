services:
  web:
    image: ${PODOCRACY_IMAGE_REGISTRY:-ghcr.io}/${PODOCRACY_IMAGE_NAMESPACE:-cloudsecmentor}/podocracy-web:${PODOCRACY_IMAGE_TAG:-latest}
    environment:
      PORTAL_ADMIN_PASSWORD: ${PORTAL_ADMIN_PASSWORD:-}
    ports:
      - "${PORTAL_HTTP_PORT:-8080}:80"
    depends_on:
      - app-api
    restart: unless-stopped

  app-api:
    image: ${PODOCRACY_IMAGE_REGISTRY:-ghcr.io}/${PODOCRACY_IMAGE_NAMESPACE:-cloudsecmentor}/podocracy-api:${PODOCRACY_IMAGE_TAG:-latest}
    env_file:
      - path: ${PODOCRACY_ENV_FILE:-.env}
        required: false
    environment:
      PROJECTS_DIR: /data/projects
    volumes:
      - type: bind
        source: ${PODOCRACY_PROJECTS_DIR:-./data/projects}
        target: /data/projects
    expose:
      - "8000"
    restart: unless-stopped

  worker:
    image: ${PODOCRACY_IMAGE_REGISTRY:-ghcr.io}/${PODOCRACY_IMAGE_NAMESPACE:-cloudsecmentor}/podocracy-worker:${PODOCRACY_IMAGE_TAG:-latest}
    env_file:
      - path: ${PODOCRACY_ENV_FILE:-.env}
        required: false
    environment:
      PROJECTS_DIR: /data/projects
      WORKER_POLL_SECONDS: ${WORKER_POLL_SECONDS:-3}
    volumes:
      - type: bind
        source: ${PODOCRACY_PROJECTS_DIR:-./data/projects}
        target: /data/projects
    depends_on:
      - app-api
    restart: unless-stopped
